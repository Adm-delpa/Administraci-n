<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Del Palacio S.A. — Acceso</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0D1B2A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}

.bg-pattern{position:fixed;inset:0;background:linear-gradient(135deg,#0D1B2A 0%,#1a2d45 50%,#0D1B2A 100%);z-index:0}
.bg-pattern::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(30,111,217,.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(196,130,10,.08) 0%,transparent 50%)}

.login-wrap{position:relative;z-index:1;width:100%;max-width:400px}

.logo-area{text-align:center;margin-bottom:2rem}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#1E6FD9,#0D4FA0);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(30,111,217,.35)}
.logo-icon svg{color:#fff}
.logo-empresa{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.3rem}
.logo-titulo{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.02em}
.logo-sub{font-size:13px;color:rgba(255,255,255,.4);margin-top:.25rem}

.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:2rem;backdrop-filter:blur(10px)}
.card-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:.25rem}
.card-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:1.5rem}

.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.field input{width:100%;padding:.75rem 1rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;transition:border-color .15s,background .15s;outline:none}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{border-color:rgba(30,111,217,.6);background:rgba(255,255,255,.1)}

.login-btn{width:100%;padding:.8rem;background:linear-gradient(135deg,#1E6FD9,#0D4FA0);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.01em;margin-top:.5rem}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-msg{display:none;background:rgba(193,51,51,.15);border:1px solid rgba(193,51,51,.3);color:#F87171;border-radius:7px;padding:.65rem .9rem;font-size:12px;font-weight:500;margin-top:.75rem;text-align:center}
.error-msg.show{display:block}

.footer-note{text-align:center;margin-top:1.5rem;font-size:11px;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <div class="logo-empresa">Distribuidora del Palacio S.A.</div>
    <div class="logo-titulo">Sistema de Gestión</div>
    <div class="logo-sub">Panel Administrativo</div>
  </div>

  <div class="card">
    <div class="card-title">Iniciar sesión</div>
    <div class="card-sub">Ingresá tus credenciales para continuar</div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="tu usuario" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="login-btn" id="btn-login" onclick="login()">Ingresar</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
  <div class="footer-note">© 2026 Distribuidora del Palacio S.A.</div>
</div>

<script>
async function login(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('error-msg');
  if(!username||!password){ showErr('Completá usuario y contraseña.'); return; }
  btn.disabled=true; btn.textContent='Verificando…'; err.classList.remove('show');
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(!r.ok){ showErr(d.error||'Error al ingresar.'); return; }
    sessionStorage.setItem('user', JSON.stringify(d));
    fetch('/api/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:d.username,nombre:d.nombre,accion:'login',detalle:'Ingresó al sistema'})}).catch(()=>{});
    window.location.href='/panel';
  }catch(e){ showErr('No se pudo conectar con el servidor.'); }
  finally{ btn.disabled=false; btn.textContent='Ingresar'; }
}
function showErr(msg){
  const el=document.getElementById('error-msg');
  el.textContent=msg; el.classList.add('show');
}
// Si ya está logueado, redirigir
const u=sessionStorage.getItem('user');
if(u) window.location.href='/panel';
</script>
</body>
</html>
