<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gente — del Palacio S.A</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#18181A}
a{color:inherit}

.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:270px;flex-shrink:0;border-right:1px solid #E7E5E1;display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
.sidebar-header{padding:1.5rem 1.25rem 1.1rem;display:flex;align-items:center;gap:12px}
.sidebar-logo{width:46px;height:46px;flex-shrink:0}
.sidebar-logo img{width:100%;height:100%;object-fit:contain}
.sidebar-empresa{font-size:16px;font-weight:700;color:#18181A;letter-spacing:-.01em}

.sidebar-nav{flex:1;overflow-y:auto;padding:0 .9rem}
.nav-inicio{display:block;width:100%;text-align:left;background:#18181A;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:.6rem}
.nav-inicio:hover{background:#000}
.nav-inicio.active{background:#0D4FA0}

.nav-node{margin-bottom:1px}
.nav-row{display:flex;align-items:center;gap:4px}
.nav-label{flex:1;display:flex;align-items:center;gap:6px;text-align:left;background:none;border:none;padding:7px 8px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;color:#18181A;cursor:pointer;border-radius:6px;text-transform:uppercase;letter-spacing:.01em;line-height:1.35}
.nav-node[data-depth="1"] .nav-label{font-size:12px;font-weight:500;text-transform:none;color:#3A3935}
.nav-node[data-depth="2"] .nav-label{font-size:11.5px;font-weight:500;text-transform:none;color:#56555A}
.nav-node[data-depth="3"] .nav-label{font-size:11px;font-weight:500;text-transform:none;color:#77756F}
.nav-label:hover{background:#F5F4F1}
.nav-label.active{background:#EAF1FB;color:#0D4FA0}
.nav-chevron{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:#9896A0;transition:transform .15s}
.nav-chevron.open{transform:rotate(90deg)}
.nav-children{margin-left:14px;padding-left:8px;border-left:1px solid #EDEBE7;display:none}
.nav-children.open{display:block}
.nav-add-child{display:none}
.nav-node:hover>.nav-row>.nav-add-child{display:inline-flex}
.nav-add-child{align-items:center;justify-content:center;width:18px;height:18px;border:none;background:none;color:#9896A0;cursor:pointer;font-size:14px;border-radius:4px;flex-shrink:0}
.nav-add-child:hover{background:#EAF1FB;color:#0D4FA0}

.sidebar-add-section{margin:.75rem 0;width:100%;text-align:left;padding:7px 8px;background:none;border:1.5px dashed #DDDBD6;border-radius:6px;font-family:'Inter',sans-serif;font-size:11.5px;font-weight:700;color:#0D4FA0;cursor:pointer}
.sidebar-add-section:hover{background:#EAF1FB;border-color:#0D4FA0}

.sidebar-footer{padding:.9rem 1.25rem;border-top:1px solid #E7E5E1;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sidebar-user{font-size:11.5px;color:#56555A;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-logout{background:none;border:none;color:#9896A0;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.sidebar-logout:hover{color:#C0392B;text-decoration:underline}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.main-content{flex:1;max-width:980px;width:100%;margin:0 auto;padding:3.5rem 2rem 3rem}

.hero-title{font-size:56px;font-weight:800;letter-spacing:-.02em;text-align:center;color:#18181A;line-height:1.05}
.hero-underline{height:5px;background:#0D4FA0;border-radius:3px;width:65%;max-width:520px;margin:1.4rem auto 2.2rem}
.hero-text{max-width:760px;margin:0 auto;text-align:center}
.hero-text p{font-size:15px;line-height:1.8;color:#3A3935;margin-bottom:1.1rem}
.hero-banner{margin-top:2.5rem;background:#0D4FA0;border-radius:10px;padding:2rem 2.5rem;text-align:center}
.hero-banner-text{font-size:17px;font-weight:700;color:#fff;line-height:1.6}

.page-title{font-size:38px;font-weight:800;letter-spacing:-.02em;text-align:center;color:#18181A;line-height:1.1}
.page-underline{height:5px;background:#0D4FA0;border-radius:3px;width:50%;max-width:340px;margin:1.2rem auto 2rem}
.page-body{font-size:14px;line-height:1.8;color:#3A3935;white-space:pre-wrap;margin-bottom:1.5rem}
.page-empty{text-align:center;color:#9896A0;font-size:13px;padding:1rem 0}

/* BLOQUES (vista) */
.blocks{display:flex;flex-direction:column;gap:1.5rem;margin-top:.5rem}
.block-texto-view{font-family:'Poppins',sans-serif;font-size:14px;line-height:1.8;color:#3A3935;white-space:pre-wrap}
.block-imagen-view img{max-width:100%;border-radius:10px;display:block}
.block-imagen-caption{font-family:'Poppins',sans-serif;font-size:11.5px;color:#9896A0;margin-top:.5rem;text-align:center}
.recurso-block{border:1px solid #E7E5E1;border-radius:10px;overflow:hidden}
.recurso-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:.65rem 1rem;background:#F8F7F5;border-bottom:1px solid #E7E5E1}
.recurso-label{font-family:'Poppins',sans-serif;font-size:12.5px;font-weight:700;color:#18181A;display:flex;align-items:center;gap:7px}
.recurso-abrir{font-size:11.5px;font-weight:600;color:#0D4FA0;text-decoration:none;white-space:nowrap}
.recurso-abrir:hover{text-decoration:underline}
.recurso-iframe{width:100%;height:480px;border:none;display:block}

/* BLOQUES (edición + drag&drop) */
.blocks-edit{display:flex;flex-direction:column;gap:10px;margin-bottom:.75rem}
.block-card{border:1.5px solid #E7E5E1;border-radius:10px;background:#fff;transition:border-color .12s,box-shadow .12s}
.block-card.dragging{opacity:.4}
.block-card.drag-over{border-color:#0D4FA0;box-shadow:0 0 0 3px #EAF1FB}
.block-card-head{display:flex;align-items:center;gap:8px;padding:.55rem .7rem;background:#F8F7F5;border-bottom:1px solid #E7E5E1;border-radius:9px 9px 0 0}
.block-drag-handle{cursor:grab;color:#9896A0;font-size:14px;user-select:none;padding:2px 4px}
.block-drag-handle:active{cursor:grabbing}
.block-tipo-label{flex:1;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#56555A;display:flex;align-items:center;gap:6px}
.block-card-body{padding:.75rem .9rem}
.block-card-body input,.block-card-body textarea{width:100%;padding:.5rem .7rem;border:1.5px solid #DDDBD6;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;margin-bottom:6px}
.block-card-body input:focus,.block-card-body textarea:focus{border-color:#0D4FA0}
.block-card-body textarea{resize:vertical;line-height:1.6}

.insertar-wrap{position:relative;display:inline-block}
.btn-insertar{padding:8px 16px;background:#18181A;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-insertar:hover{background:#0D4FA0}
.insertar-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid #DDDBD6;border-radius:12px;box-shadow:0 12px 32px rgba(0,0,0,.14);padding:.6rem;z-index:60;width:230px}
.insertar-menu.open{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.insertar-opt{display:flex;flex-direction:column;align-items:center;gap:6px;padding:.9rem .5rem;background:none;border:1px solid #EDEBE7;border-radius:9px;cursor:pointer;font-family:'Inter',sans-serif;font-size:11.5px;font-weight:600;color:#3A3935}
.insertar-opt:hover{background:#EAF1FB;border-color:#0D4FA0;color:#0D4FA0}
.insertar-opt .opt-icon{font-size:20px}

.app-footer{border-top:1px solid #E7E5E1;background:#F8F7F5;padding:1rem 2rem;display:flex;align-items:center;justify-content:center;gap:8px}
.app-footer-text{font-size:11px;font-weight:700;letter-spacing:.06em;color:#9896A0;text-transform:uppercase}

.fab-edit{position:fixed;bottom:1.75rem;right:1.75rem;width:52px;height:52px;border-radius:50%;background:#18181A;color:#fff;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:20px;z-index:50}
.fab-edit:hover{background:#0D4FA0}

/* EDIT PANEL */
.edit-card{background:#fff;border:1.5px solid #0D4FA0;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.edit-title{font-size:13px;font-weight:700;color:#0D4FA0;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem}
.edit-field{margin-bottom:1rem}
.edit-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9896A0;margin-bottom:4px}
.edit-field input,.edit-field textarea,.edit-field select{width:100%;padding:.55rem .8rem;border:1.5px solid #DDDBD6;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;background:#fff;color:#18181A}
.edit-field input:focus,.edit-field textarea:focus,.edit-field select:focus{border-color:#0D4FA0}
.edit-field textarea{resize:vertical;line-height:1.6}
.edit-block-title{font-size:12px;font-weight:700;color:#18181A;margin:1.25rem 0 .6rem;padding-top:1rem;border-top:1px solid #F5F5F7}
.edit-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.edit-row .rec-tipo{width:110px;flex-shrink:0}
.edit-row .row-fields{flex:1;display:flex;flex-direction:column;gap:6px}
.btn-x{background:#FAE0E0;color:#8A1F1F;border:none;border-radius:6px;width:30px;height:30px;flex-shrink:0;cursor:pointer;font-size:13px;font-weight:700}
.btn-x:hover{background:#f5c0c0}
.btn-add-row{padding:6px 12px;background:#F2F1EE;color:#0D4FA0;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.btn-add-row:hover{background:#EAF1FB}
.edit-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #F5F5F7}
.btn-cancel{padding:7px 14px;background:#F2F1EE;color:#56555A;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-save{padding:7px 16px;background:#0D4FA0;color:#fff;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-save:hover{background:#093a78}
.btn-borrar-pagina{background:none;border:none;color:#C0392B;font-size:12px;font-weight:600;cursor:pointer;margin-right:auto}
.btn-borrar-pagina:hover{text-decoration:underline}

@media(max-width:860px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid #E7E5E1}
  .main-content{padding:2rem 1.25rem}
  .hero-title{font-size:38px}
  .page-title{font-size:28px}
}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><img src="/logo.png" alt="Logo"></div>
      <div class="sidebar-empresa" id="sidebar-empresa">del Palacio S.A</div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-inicio active" id="nav-inicio" onclick="irAInicio()">Inicio</button>
      <div id="nav-tree"></div>
      <button class="sidebar-add-section" onclick="nuevaPagina(null)">+ Nueva sección</button>
    </div>
    <div class="sidebar-footer">
      <span class="sidebar-user" id="sidebar-user">—</span>
      <button class="sidebar-logout" onclick="if(confirm('¿Cerrar sesión?')){sessionStorage.clear();window.location.href='/'}">Salir</button>
    </div>
  </div>

  <div class="main">
    <div class="main-content" id="main-content">
      <div class="page-empty">Cargando...</div>
    </div>
    <div class="app-footer">
      <span class="app-footer-text" id="app-footer-text">EQUIPO DE GENTE - DEL PALACIO SA</span>
    </div>
  </div>
</div>

<button class="fab-edit" id="fab-edit" onclick="toggleEdit()" title="Editar">✎</button>

<script>
const USER = JSON.parse(sessionStorage.getItem('user') || 'null');
if (!USER) { window.location.href = '/'; }
document.getElementById('sidebar-user').textContent = USER.nombre || USER.username;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }

// Detecta links de Drive/Docs/Sheets/Slides/Forms pegados tal cual (los de "Compartir")
// y los convierte al formato que realmente se puede incrustar.
function normalizeDriveUrl(raw, mode){
  if(!raw) return raw;
  var url = raw.trim();
  if(!/(drive|docs)\.google\.com/.test(url)) return url;
  var m;
  if((m = url.match(/drive\.google\.com\/drive\/folders\/([a-zA-Z0-9_-]+)/))){
    return mode==='imagen' ? url : 'https://drive.google.com/embeddedfolderview?id='+m[1]+'#list';
  }
  if((m = url.match(/docs\.google\.com\/document\/d\/([a-zA-Z0-9_-]+)/))){
    return 'https://docs.google.com/document/d/'+m[1]+'/preview';
  }
  if((m = url.match(/docs\.google\.com\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/))){
    return 'https://docs.google.com/spreadsheets/d/'+m[1]+'/preview';
  }
  if((m = url.match(/docs\.google\.com\/presentation\/d\/([a-zA-Z0-9_-]+)/))){
    return 'https://docs.google.com/presentation/d/'+m[1]+'/preview';
  }
  if((m = url.match(/docs\.google\.com\/forms\/d\/([a-zA-Z0-9_-]+)/))){
    return 'https://docs.google.com/forms/d/'+m[1]+'/viewform';
  }
  if((m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/)) || (m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/))){
    return mode==='imagen' ? '/api/img-proxy/'+m[1] : 'https://drive.google.com/file/d/'+m[1]+'/preview';
  }
  return url;
}

var CONFIG = {};
var PAGINAS = [];
var EXPANDED = new Set();
var VISTA = 'inicio'; // 'inicio' | pagina id
var EDITANDO = false;
var EDIT_STATE = null;

async function cargarTodo(){
  try{
    const [rc, rp] = await Promise.all([fetch('/api/config'), fetch('/api/paginas')]);
    CONFIG = await rc.json();
    PAGINAS = await rp.json();
    document.getElementById('sidebar-empresa').textContent = CONFIG.nombre_empresa || 'del Palacio S.A';
    document.getElementById('app-footer-text').textContent = CONFIG.footer_texto || '';
    renderNav();
    renderMain();
  }catch(e){
    document.getElementById('main-content').innerHTML = '<div class="page-empty" style="color:#C0392B">Error al cargar.</div>';
  }
}

function hijosDe(id){
  return PAGINAS.filter(p => p.parent_id === id).sort((a,b)=> (a.orden||0)-(b.orden||0));
}
function paginaById(id){ return PAGINAS.find(p => p.id === id); }

function renderNav(){
  const cont = document.getElementById('nav-tree');
  cont.innerHTML = hijosDe(null).map(p => renderNavNode(p, 0)).join('');
}

function renderNavNode(p, depth){
  const hijos = hijosDe(p.id);
  const tieneHijos = hijos.length > 0;
  const abierto = EXPANDED.has(p.id);
  const activo = VISTA === p.id;
  return '<div class="nav-node" data-depth="'+depth+'">'
    +'<div class="nav-row">'
    +'<button class="nav-label'+(activo?' active':'')+'" onclick="seleccionarPagina('+p.id+')">'+esc(p.titulo)+'</button>'
    +'<button class="nav-add-child" title="Agregar subsección" onclick="event.stopPropagation();nuevaPagina('+p.id+')">+</button>'
    +(tieneHijos?'<button class="nav-chevron'+(abierto?' open':'')+'" onclick="event.stopPropagation();toggleExpand('+p.id+')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>':'<span style="width:20px"></span>')
    +'</div>'
    +(tieneHijos?'<div class="nav-children'+(abierto?' open':'')+'">'+hijos.map(h=>renderNavNode(h, depth+1)).join('')+'</div>':'')
    +'</div>';
}

function toggleExpand(id){
  if(EXPANDED.has(id)) EXPANDED.delete(id); else EXPANDED.add(id);
  renderNav();
}

function irAInicio(){
  VISTA = 'inicio';
  EDITANDO = false; EDIT_STATE = null;
  renderNav();
  renderMain();
}

function seleccionarPagina(id){
  VISTA = id;
  EDITANDO = false; EDIT_STATE = null;
  if(hijosDe(id).length>0) EXPANDED.add(id);
  document.getElementById('nav-inicio').classList.remove('active');
  renderNav();
  renderMain();
}

async function nuevaPagina(parentId){
  const titulo = prompt(parentId ? 'Título de la nueva subsección' : 'Título de la nueva sección (ej: "8. Beneficios")');
  if(!titulo || !titulo.trim()) return;
  try{
    const r = await fetch('/api/paginas',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({titulo:titulo.trim(), parent_id: parentId||null})});
    const d = await r.json();
    if(!r.ok){ alert(d.error||'Error al crear.'); return; }
    if(parentId) EXPANDED.add(parentId);
    await cargarTodo();
    seleccionarPagina(d.id);
  }catch(e){ alert('Error de conexión.'); }
}

async function borrarPagina(id){
  const hijos = hijosDe(id);
  const msg = hijos.length>0
    ? '¿Eliminar esta sección y sus '+hijos.length+' subsección(es)? Esta acción no se puede deshacer.'
    : '¿Eliminar esta sección? Esta acción no se puede deshacer.';
  if(!confirm(msg)) return;
  try{
    await fetch('/api/paginas/'+id,{method:'DELETE'});
    VISTA = 'inicio';
    EDITANDO = false; EDIT_STATE = null;
    await cargarTodo();
  }catch(e){ alert('Error de conexión.'); }
}

function toggleEdit(){
  if(EDITANDO){ EDITANDO = false; EDIT_STATE = null; renderMain(); return; }
  EDITANDO = true;
  if(VISTA === 'inicio'){
    EDIT_STATE = {
      nombre_empresa: CONFIG.nombre_empresa || '',
      intro_titulo: CONFIG.intro_titulo || '',
      intro_parrafo1: CONFIG.intro_parrafo1 || '',
      intro_parrafo2: CONFIG.intro_parrafo2 || '',
      frase_destacada: CONFIG.frase_destacada || '',
      footer_texto: CONFIG.footer_texto || ''
    };
  } else {
    const p = paginaById(VISTA);
    if(!p) return;
    EDIT_STATE = {
      titulo: p.titulo,
      bloques: (p.bloques||[]).map(b => ({ tipo:b.tipo, data: Object.assign({}, b.data) }))
    };
  }
  renderMain();
}

function editSyncInicioFromInputs(){
  EDIT_STATE.nombre_empresa = document.getElementById('e-nombre-empresa').value;
  EDIT_STATE.intro_titulo = document.getElementById('e-intro-titulo').value;
  EDIT_STATE.intro_parrafo1 = document.getElementById('e-parrafo1').value;
  EDIT_STATE.intro_parrafo2 = document.getElementById('e-parrafo2').value;
  EDIT_STATE.frase_destacada = document.getElementById('e-frase').value;
  EDIT_STATE.footer_texto = document.getElementById('e-footer').value;
}

async function guardarInicio(){
  editSyncInicioFromInputs();
  try{
    const r = await fetch('/api/config',{method:'PUT',headers:{'Content-Type':'application/json'}, body:JSON.stringify(EDIT_STATE)});
    if(!r.ok){ alert('Error al guardar.'); return; }
    EDITANDO = false; EDIT_STATE = null;
    await cargarTodo();
  }catch(e){ alert('Error de conexión.'); }
}

function editSyncPaginaFromInputs(){
  EDIT_STATE.titulo = document.getElementById('e-titulo').value;
  document.querySelectorAll('#e-bloques .block-card').forEach(function(card,i){
    const b = EDIT_STATE.bloques[i];
    if(b.tipo==='texto'){
      b.data.texto = card.querySelector('.b-texto').value;
    } else if(b.tipo==='imagen'){
      b.data.url = normalizeDriveUrl(card.querySelector('.b-img-url').value, 'imagen');
      b.data.caption = card.querySelector('.b-img-caption').value;
    } else if(b.tipo==='embed'){
      b.data.url = normalizeDriveUrl(card.querySelector('.b-embed-url').value, 'embed');
      b.data.titulo = card.querySelector('.b-embed-titulo').value;
    }
  });
}

function toggleInsertarMenu(){
  document.getElementById('insertar-menu').classList.toggle('open');
}

function editAgregarBloque(tipo){
  editSyncPaginaFromInputs();
  const defaults = { texto:{texto:''}, imagen:{url:'',caption:''}, embed:{url:'',titulo:''} };
  EDIT_STATE.bloques.push({ tipo, data: defaults[tipo] });
  document.getElementById('insertar-menu').classList.remove('open');
  renderMain();
}

function editBorrarBloque(i){
  editSyncPaginaFromInputs();
  EDIT_STATE.bloques.splice(i,1);
  renderMain();
}

var DRAG_INDEX = null;
function blockDragStart(i){ DRAG_INDEX = i; }
function blockDragOver(ev, i){
  ev.preventDefault();
  document.querySelectorAll('.block-card').forEach(function(c){ c.classList.remove('drag-over'); });
  const card = document.querySelectorAll('.block-card')[i];
  if(card && i !== DRAG_INDEX) card.classList.add('drag-over');
}
function blockDrop(ev, i){
  ev.preventDefault();
  if(DRAG_INDEX === null || DRAG_INDEX === i) return;
  editSyncPaginaFromInputs();
  const moved = EDIT_STATE.bloques.splice(DRAG_INDEX, 1)[0];
  EDIT_STATE.bloques.splice(i, 0, moved);
  DRAG_INDEX = null;
  renderMain();
}
function blockDragEnd(){
  DRAG_INDEX = null;
  document.querySelectorAll('.block-card').forEach(function(c){ c.classList.remove('drag-over'); });
}

async function guardarPagina(){
  editSyncPaginaFromInputs();
  const titulo = EDIT_STATE.titulo.trim();
  if(!titulo){ alert('Ingresá un título.'); return; }
  try{
    const r = await fetch('/api/paginas/'+VISTA,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        titulo: titulo,
        bloques: EDIT_STATE.bloques.filter(function(b){
          if(b.tipo==='texto') return b.data.texto && b.data.texto.trim();
          return b.data.url && b.data.url.trim();
        })
      })});
    if(!r.ok){ alert('Error al guardar.'); return; }
    EDITANDO = false; EDIT_STATE = null;
    await cargarTodo();
  }catch(e){ alert('Error de conexión.'); }
}

function renderBloqueView(b){
  if(b.tipo==='texto'){
    return '<div class="block-texto-view">'+esc(b.data.texto)+'</div>';
  }
  if(b.tipo==='imagen'){
    return '<div class="block-imagen-view"><img src="'+escAttr(b.data.url)+'" alt="'+escAttr(b.data.caption||'')+'">'
      +(b.data.caption?'<div class="block-imagen-caption">'+esc(b.data.caption)+'</div>':'')
      +'</div>';
  }
  // embed
  return '<div class="recurso-block">'
    +'<div class="recurso-head">'
    +'<span class="recurso-label">🔗 '+esc(b.data.titulo || 'Contenido incorporado')+'</span>'
    +'<a class="recurso-abrir" href="'+escAttr(b.data.url)+'" target="_blank" rel="noopener">Abrir en pestaña nueva ↗</a>'
    +'</div>'
    +'<iframe class="recurso-iframe" src="'+escAttr(b.data.url)+'" loading="lazy"></iframe>'
    +'</div>';
}

function renderInicioView(){
  return '<div class="hero-title">'+esc(CONFIG.intro_titulo||'')+'</div>'
    +'<div class="hero-underline"></div>'
    +'<div class="hero-text">'
    +(CONFIG.intro_parrafo1?'<p>'+esc(CONFIG.intro_parrafo1)+'</p>':'')
    +(CONFIG.intro_parrafo2?'<p>'+esc(CONFIG.intro_parrafo2)+'</p>':'')
    +'</div>'
    +(CONFIG.frase_destacada?'<div class="hero-banner"><div class="hero-banner-text">'+esc(CONFIG.frase_destacada)+'</div></div>':'');
}

function renderInicioEdit(){
  const s = EDIT_STATE;
  return '<div class="edit-card">'
    +'<div class="edit-title">Editar página de inicio</div>'
    +'<div class="edit-field"><label>Nombre de la empresa (cabecera)</label><input id="e-nombre-empresa" value="'+escAttr(s.nombre_empresa)+'"></div>'
    +'<div class="edit-field"><label>Título grande (ej: GENTE)</label><input id="e-intro-titulo" value="'+escAttr(s.intro_titulo)+'"></div>'
    +'<div class="edit-field"><label>Párrafo 1</label><textarea id="e-parrafo1" rows="4">'+esc(s.intro_parrafo1)+'</textarea></div>'
    +'<div class="edit-field"><label>Párrafo 2</label><textarea id="e-parrafo2" rows="4">'+esc(s.intro_parrafo2)+'</textarea></div>'
    +'<div class="edit-field"><label>Frase destacada (banner)</label><textarea id="e-frase" rows="3">'+esc(s.frase_destacada)+'</textarea></div>'
    +'<div class="edit-field"><label>Texto del pie de página</label><input id="e-footer" value="'+escAttr(s.footer_texto)+'"></div>'
    +'<div class="edit-footer">'
    +'<button class="btn-cancel" onclick="toggleEdit()">Cancelar</button>'
    +'<button class="btn-save" onclick="guardarInicio()">Guardar cambios</button>'
    +'</div></div>';
}

function renderPaginaView(p){
  const bloques = p.bloques||[];
  return '<div class="page-title">'+esc(p.titulo)+'</div>'
    +'<div class="page-underline"></div>'
    +(bloques.length>0?'<div class="blocks">'+bloques.map(renderBloqueView).join('')+'</div>':'<div class="page-empty">Todavía no cargaste contenido acá. Usá el botón ✎ para insertar texto, imágenes o incorporar archivos.</div>');
}

function renderBloqueEdit(b, i){
  const drag = 'draggable="true" ondragstart="blockDragStart('+i+')" ondragover="blockDragOver(event,'+i+')" ondrop="blockDrop(event,'+i+')" ondragend="blockDragEnd()"';
  let label, body;
  if(b.tipo==='texto'){
    label = '📝 Texto';
    body = '<textarea class="b-texto" rows="4" placeholder="Escribí el texto...">'+esc(b.data.texto)+'</textarea>';
  } else if(b.tipo==='imagen'){
    label = '🖼️ Imagen';
    body = '<input class="b-img-url" value="'+escAttr(b.data.url)+'" placeholder="Pegá el link de Drive tal cual (se formatea solo)" onblur="this.value=normalizeDriveUrl(this.value,\'imagen\')">'
      +'<input class="b-img-caption" value="'+escAttr(b.data.caption)+'" placeholder="Descripción (opcional)">';
  } else {
    label = '🔗 Incorporar (Drive, Sheets, Docs, Slides, Forms, PDF...)';
    body = '<input class="b-embed-url" value="'+escAttr(b.data.url)+'" placeholder="Pegá el link de Drive tal cual (se formatea solo)" onblur="this.value=normalizeDriveUrl(this.value,\'embed\')">'
      +'<input class="b-embed-titulo" value="'+escAttr(b.data.titulo)+'" placeholder="Título (opcional)">';
  }
  return '<div class="block-card" '+drag+'>'
    +'<div class="block-card-head">'
    +'<span class="block-drag-handle" title="Arrastrar para reordenar">⠿⠿</span>'
    +'<span class="block-tipo-label">'+label+'</span>'
    +'<button class="btn-x" style="width:24px;height:24px" onclick="editBorrarBloque('+i+')" title="Eliminar">✕</button>'
    +'</div>'
    +'<div class="block-card-body">'+body+'</div>'
    +'</div>';
}

function renderPaginaEdit(){
  const s = EDIT_STATE;
  return '<div class="edit-card">'
    +'<div class="edit-title">Editar sección</div>'
    +'<div class="edit-field"><label>Título</label><input id="e-titulo" value="'+escAttr(s.titulo)+'"></div>'
    +'<div class="edit-block-title">Contenido</div>'
    +'<div id="e-bloques" class="blocks-edit">'+s.bloques.map(renderBloqueEdit).join('')+'</div>'
    +'<div class="insertar-wrap">'
    +'<button class="btn-insertar" onclick="editSyncPaginaFromInputs();toggleInsertarMenu()">+ Insertar</button>'
    +'<div class="insertar-menu" id="insertar-menu">'
    +'<button class="insertar-opt" onclick="editAgregarBloque(\'texto\')"><span class="opt-icon">📝</span>Cuadro de texto</button>'
    +'<button class="insertar-opt" onclick="editAgregarBloque(\'imagen\')"><span class="opt-icon">🖼️</span>Imagen</button>'
    +'<button class="insertar-opt" onclick="editAgregarBloque(\'embed\')"><span class="opt-icon">🔗</span>Incorporar</button>'
    +'</div>'
    +'</div>'
    +'<div class="edit-footer">'
    +'<button class="btn-borrar-pagina" onclick="borrarPagina('+VISTA+')">Eliminar sección</button>'
    +'<button class="btn-cancel" onclick="toggleEdit()">Cancelar</button>'
    +'<button class="btn-save" onclick="guardarPagina()">Guardar cambios</button>'
    +'</div></div>';
}

function renderMain(){
  const cont = document.getElementById('main-content');
  document.getElementById('nav-inicio').classList.toggle('active', VISTA==='inicio');
  if(VISTA === 'inicio'){
    cont.innerHTML = EDITANDO ? renderInicioEdit() : renderInicioView();
    return;
  }
  const p = paginaById(VISTA);
  if(!p){ cont.innerHTML = '<div class="page-empty">Elegí una sección del menú.</div>'; return; }
  cont.innerHTML = EDITANDO ? renderPaginaEdit() : renderPaginaView(p);
}

document.addEventListener('click', function(ev){
  const menu = document.getElementById('insertar-menu');
  if(!menu || !menu.classList.contains('open')) return;
  if(!ev.target.closest('.insertar-wrap')) menu.classList.remove('open');
});

cargarTodo();
</script>
</body>
</html>
